<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div style="display:flex;min-height:100vh;">

<aside style="width:220px;background:#111;padding:20px;">
  <h2>Admin</h2>
  <a href="#">Dashboard</a>
