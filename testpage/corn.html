<button onclick="openVideo()">Watch Video</button>

<div id="videoModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black;">
  <iframe 
    src="https://youtu.be/K_8yRH2KPVo?si=IwMs7FiK4V39NqDq"
    style="width:80%; height:80%; margin:5% 10%; border:none;">
  </iframe>

  <button onclick="closeVideo()">Close</button>
</div>

<script>
function openVideo() {
  document.getElementById("videoModal").style.display = "block";
}

function closeVideo() {
  document.getElementById("videoModal").style.display = "none";
}
</script>
